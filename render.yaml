# Render Blueprint — backend API.
# In Render: New + → Blueprint → connect this repo → Apply.
# Render reads this file and pre-fills everything below.
services:
  - type: web
    name: subscriptions-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Secrets — set these in the Render dashboard, not in this file.
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
