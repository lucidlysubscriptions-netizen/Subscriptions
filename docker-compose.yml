services:
  db:
    image: postgres:16
    container_name: subscriptions-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lucidly
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: subscriptions
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
